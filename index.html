<!DOCTYPE html>
<html lang="zh-CN">
<head>

    <meta name="viewport" content="width=device-width,user-scalable=no">
    <meta charset="UTF-8">

    <title>猜密码游戏</title>
    <style>
        body {
            background:#F4F8F5 ;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial;
        }
        .htp {
            padding: 7px 6px;
            background:#67A079;
            border-radius: 8px;
            border: none;
            color: white;
            font-size: 12px;
            width: 8%;
            min-width: 58px;
            cursor: pointer;
        }
        .Board {
            padding: 32px;
            text-align: center;
            background: white;
            border: none;
            border-radius: 28px;
            width: 70%;
            min-height: 400px;
        }
        .bt {
            padding: 8px 16px;
            background:#67A079;
            border-radius: 8px;
            border: none;
            color: white;
            font-size: 16px;
            width: 16%;
            min-width: 120px;
            cursor: pointer;
        }
        .GS {
            font-size: 22px;
            color: rgb(100,100,100);
        }
        
        .digit-ipt {
            width: 40px;
            height: 40px;
            text-align: center;
            font-size: 16px;
            border-radius: 12px;
            border: 1px solid #DEEBDA;
            outline: none;
        }
        .HS{
            color: #be7171;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="Board">
        <h1 class="GS">GuessGame</h1>
        <h1>猜密码游戏</h1>

        <span><b>我已经想好一个4位密码（数字1-6，不重复）</b></span>
        <br> <br>

        <div class="digit-container">
            <input class="digit-ipt" type="number" id="d1" maxlength="1" oninput="checkInput(this)">
            <input class="digit-ipt" type="number" id="d2" maxlength="1" oninput="checkInput(this)">
            <input class="digit-ipt" type="number" id="d3" maxlength="1" oninput="checkInput(this)">
            <input class="digit-ipt" type="number" id="d4" maxlength="1" oninput="checkInput(this)">
        </div>

        <br>
        <button onclick="guess()" class="bt"><b>猜一下</b></button>
        <button onclick="resetGame()" class="bt"><b>重新开始</b></button>

        <br><br>
        <button onclick="howtoplay()" class="htp"><b>怎么玩</b></button>

        <p id="tip"></p>
        <p id="count">已猜次数：0</p>
        <p id="showtime">时间:</p>

        <p id="History" class="HS"></p>

        <p id="HTP"></p>
    </div>
    
    <script>
        //Version:1.9 (C) 2026 George.All Rights Reserved.

        function checkInput(input) {

            let val = input.value;

            if (val < '1' || val > '6') {
                input.value = '';
            }
        }

        function createPassword() {
            let pwd = [];
            while(pwd.length < 4){
                let num = Math.floor(Math.random() * 6) + 1;
                if(!pwd.includes(num)){
                    pwd.push(num);
                }
            }
            return pwd.join('');
        }

        let answer = createPassword();
        const showtime = document.getElementById('showtime');
        let count = 0;
        let time = 120;
        let timer;

        timer = setInterval(() => {
            time--;
            showtime.textContent = "时间:" + time + "s";
            if (time<=0) {
                clearInterval(timer);
                time = 0;                 
                showtime.textContent = "时间:0s";
                tip.textContent = "时间已到！必须点击【重新开始】！";
                document.getElementById("d1").disabled = true;
                document.getElementById("d2").disabled = true;
                document.getElementById("d3").disabled = true;
                document.getElementById("d4").disabled = true;
            }
        }, 1000);
        
        
        showtime.textContent = '时间:' + time + 's';

      

        function guess() {
            const tip = document.getElementById('tip');
            const countText = document.getElementById('count');
            const d1 = document.getElementById('d1'), d2 = document.getElementById('d2');
            const d3 = document.getElementById('d3'), d4 = document.getElementById('d4');
            const history = document.getElementById('History');

            if(time <= 0) {
                tip.textContent = "游戏结束！请点击重新开始游戏！";
                return;
            }

            let user = [d1.value, d2.value, d3.value, d4.value].join('');
            
            if (user.length!=4) {
                tip.textContent = '请填写完整4位数字！';
                return;
            }

       
            let isRepeat = false;

            for(let i = 0; i < 4; i++){
          
                for(let j = i + 1; j < 4; j++){
               
                    if(user[i] == user[j]){
                        isRepeat = true;
                        break;
                    }
                }
                if(isRepeat) break;
            }

            
            if(isRepeat){
                tip.textContent = '数字不能重复！';
                return;
            }

            let bull = 0, cow = 0;
            let usedAns = [false,false,false,false];
            let usedUser = [false,false,false,false];

            for(let i=0;i<4;i++){
                if(user[i] === answer[i]){
                    bull++;
                    usedAns[i] = true;
                    usedUser[i] = true;
                }
            }

            for(let i=0;i<4;i++){
                if(usedUser[i]) continue;
                for(let j=0;j<4;j++){
                    if(!usedAns[j] && user[i] === answer[j]){
                        cow++;
                        usedAns[j] = true;
                        break;
                    }
                }
            }

            count++;
            countText.textContent = '已猜次数：' + count;

            

            if (bull == 4) {
                tip.textContent = `🎉 恭喜猜对！答案是 ${answer}，共猜了 ${count} 次`;
                tip.style.color = '#4caf50';
            } else {
        
                tip.textContent = `Bull:${bull} | Cow:${cow}`;
                tip.style.color = 'black';
            }

            history.innerHTML= history.innerHTML + "第" + count + "次：" + user + " → Bull:" + bull + " | Cow:" + cow + "<br>";
        }

        function resetGame() {
            answer = createPassword();
            count = 0;
            document.getElementById('d1').value = '';
            document.getElementById('d2').value = '';
            document.getElementById('d3').value = '';
            document.getElementById('d4').value = '';
            document.getElementById('tip').textContent = '';
            document.getElementById('count').textContent = '已猜次数：0';
            document.getElementById('d1').disabled = false;
            document.getElementById('d2').disabled = false;
            document.getElementById('d3').disabled = false;
            document.getElementById('d4').disabled = false;
            document.getElementById('History').innerHTML='';
            tip.style.color = 'black';
            clearInterval(timer);
            time = 120;
            timer = setInterval(() => {
                time--;
                showtime.textContent = "时间:" + time + "s";
                if(time <= 0) clearInterval(timer);
            }, 1000);
        }

        function howtoplay() {
            let text = document.getElementById('HTP');
            let rule = '在此游戏中玩家需要破解4位随机数字密码(数字范围1-6，不重复)，每猜8次会随机交换密码中两位数字的位置。输入4个数字后可点击“猜一下”或按回车键提交，程序提示：Bull=数字+位置正确，Cow=数字正确位置错误。全部猜对即可获胜！';
            if (text.textContent !== rule) {
                text.textContent = rule;
            } else {
                text.textContent = '';
            }
        }        
    </script>
</body>
</html>
